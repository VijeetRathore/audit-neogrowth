body{font-family:Arial;padding:20px}
.section{border:1px solid #aaa;padding:15px;margin-top:20px}

hr{margin:15px 0}
  
.preview-img {

.navbar{display:flex;gap:10px;margin-top:20px}
.navbar button{padding:10px 14px;cursor:pointer}
/* ===== SUCCESS TOAST ===== */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  color:white;
  padding:14px 22px;
  border-radius:8px;
  font-size:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  z-index:9999;
  opacity:0;
  transition:opacity 0.4s ease;
}
.toast.show{
  opacity:1;
}
.hidden{
  display:none;
}

/* ===== LOADING OVERLAY ===== */
#submitOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9998;
}
  #submitOverlay.hidden { display: none !important; }

.overlay-box{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:300px;
}

.progress-bar{
  width:100%;
  height:12px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#007bff;
  transition:width 0.3s ease;
}
  
</style>

 <script>
   let currentPage = 1;
const totalPages = 6;
   let progressInterval;
let currentProgress = 0;

// ✅ ADDED: Page-wise question ranges
const PAGE_RANGES = {
  1: { start: 1, end: 18 },
  2: { start: 19, end: 27 },
};

// ✅ ADDED: submissionId persist (same row update)
let submissionId = localStorage.getItem("submissionId") || "";


// ✅ ADDED: simple id generator
function makeId() {
  return "sid-" + Date.now() + "-" + Math.random().toString(16).slice(2);
}


function showOverlay() {
  document.getElementById("submitOverlay").classList.remove("hidden");
  // Dynamic wait message (English + Local)
document.getElementById("overlayMessage").innerHTML =
  "Wait submitting data...<br>" +
  (currentMessages?.wait || "Please wait, submitting data...");
  currentProgress = 0;
  updateProgress(0);

  progressInterval = setInterval(() => {
    if (currentProgress < 95) {
      currentProgress += 1;
      updateProgress(currentProgress);
    }
  }, 40); // smooth animation
}

function updateProgress(value) {
  document.getElementById("progressFill").style.width = value + "%";
  document.getElementById("progressText").innerText = value + "%";
}

function hideOverlay() {
  clearInterval(progressInterval);
  document.getElementById("submitOverlay").classList.add("hidden");
}
function showPage(pageNumber) {
  document.querySelectorAll('.form-page').forEach(p => {
    p.classList.remove('active');
  });
  const nextPage = document.getElementById('page' + pageNumber);
  if (nextPage) {
    nextPage.classList.add('active');
    currentPage = pageNumber;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function prevPage() {
  if (currentPage > 1) {
    showPage(currentPage - 1);
  }
}
async function submitAndNext(btn) {
  const success = await submitForm(btn);

  if (success && currentPage < totalPages) {
    showPage(currentPage + 1);
  }
}
  async function submitForm(btn) {
  const submitBtn = btn;
  submitBtn.innerText = (currentMessages?.wait || "Sending...");
  submitBtn.disabled = true;
  showOverlay();

// ================= FINAL VALIDATION (Q1 - Q27) =================
const requiredIds = ['state', 'branch', 'branchHead', 'officeBoy'];
let firstErrorField = null;

// ---------- HELPERS ----------
function resetBorder(el) {
  if (el) el.style.border = "";
}
function setRedBorder(el) {
  if (el) el.style.border = "2px solid red";
}

// Count images in a container safely (supports data:image, blob:, http(s))
function countPreviewPhotos(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return 0;

  const imgs = Array.from(c.querySelectorAll("img"));
  return imgs.filter(im => {
    const src = (im && im.src) ? im.src.trim() : "";
    return src.startsWith("data:image") || src.startsWith("blob:") || src.startsWith("http");
  }).length;
}

// Border highlight for multi-photo container
function markContainer(containerId, hasError) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.style.border = hasError ? "2px solid red" : "";
}

// 1) Basic Details Validation
requiredIds.forEach(id => {
  const el = document.getElementById(id);
  const val = el ? String(el.value || "").trim() : "";

  if (!el || !val) {
    if (el) setRedBorder(el);
    if (!firstErrorField) firstErrorField = el;
  } else {
    resetBorder(el);
  }
});

// 2) Questions Loop (current page only)
const r = PAGE_RANGES[currentPage] || { start: 1, end: 18 };

for (let i = r.start; i <= r.end; i++) {
  const qid = 'q' + i;
  const qText = document.getElementById(qid + 'Text');
  if (!qText || qText.offsetParent === null) continue; // hidden skip

  // Reset question text state
  qText.style.color = "";
  const originalText = qText.innerText.split(' (')[0];
  qText.innerText = originalText;

  let errorMsg = "";

  // ============================================================
  // CASE 1: Q25 (Fire Extinguisher) - Dropdown + N Photos + N Dates
  // ============================================================
  if (qid === "q25") {
    const countEl = document.getElementById("q25Count");
    const countVal = countEl?.value;

    resetBorder(countEl);

    if (!countVal) {
      errorMsg = currentMessages.selectCount || "SELECT COUNT!";
      setRedBorder(countEl);
    } else {
      const n = parseInt(countVal, 10);

      for (let k = 1; k <= n; k++) {
        const imgK = document.getElementById(`q25Img${k}`);
        const expK = document.getElementById(`q25Exp${k}`);

        const imgSrc = imgK?.src ? imgK.src.trim() : "";
        const hasPhoto = imgSrc.startsWith("data:image") || imgSrc.startsWith("blob:") || imgSrc.startsWith("http");

        const dateVal = expK ? expK.value : "";
        const year = dateVal ? new Date(dateVal).getFullYear() : 0;
        const isDateValid = (year >= 2019 && year <= 2028);

        // Highlight date field
        if (expK) expK.style.border = isDateValid ? "" : "2px solid red";

        if (!hasPhoto || !isDateValid) {
          errorMsg = "ALL PHOTOS & DATES (2019-2028) REQUIRED!";
          break;
        }
      }
    }
  }

  // ============================================================
  // CASE 2: All other questions (Radio based)
  // ============================================================
  else {
    const radio = document.querySelector(`input[name="${qid}"]:checked`);

    // (A) Radio mandatory
    if (!radio) {
      errorMsg = "SELECTION REQUIRED!";
    }

    // (B) If "Yes" then additional validations
    else if (radio.value === "Yes") {

      // Policy Details: Q3 - Q10
      if (i >= 3 && i <= 10) {
        const vInput = document.querySelector(`#${qid} input.detail-input:nth-of-type(1)`);
        const iInput = document.querySelector(`#${qid} input.detail-input:nth-of-type(2)`);
        const eInput = document.querySelector(`#${qid} input.detail-input:nth-of-type(3)`);

        resetBorder(vInput);
        resetBorder(iInput);
        resetBorder(eInput);

        const version = vInput?.value ? vInput.value.trim() : "";
        const iYear = iInput?.value ? new Date(iInput.value).getFullYear() : 0;
        const eYear = eInput?.value ? new Date(eInput.value).getFullYear() : 0;

        const iValid = (iYear >= 2019 && iYear <= 2028);
        const eValid = (eYear >= 2019 && eYear <= 2028);

        if (!version || !iValid || !eValid) {
          errorMsg = "VERSION & DATES (2019-2028) REQUIRED!";
          if (!version) setRedBorder(vInput);
          if (!iValid) setRedBorder(iInput);
          if (!eValid) setRedBorder(eInput);
        }
      }

      // Multi-Photo: Q21, Q24
      if (!errorMsg && (qid === "q21" || qid === "q24")) {
        const containerId = qid + "Photos";
        markContainer(containerId, false);

        const photoCount = countPreviewPhotos(containerId);

        if (photoCount === 0) {
          errorMsg = "MIN 1 PHOTO REQUIRED!";
          markContainer(containerId, true);
        } else if (photoCount > 5) {
          errorMsg = "MAX 5 PHOTOS ALLOWED!";
          markContainer(containerId, true);
        }
      }

      // Standard Single Photo (exclude Q21/Q24/Q25 to avoid conflict)
      if (!errorMsg && qid !== "q21" && qid !== "q24" && qid !== "q25") {
        const img = document.getElementById(qid + 'Img');

        // If img element doesn't exist, don't throw photo error here
        if (img) {
          const src = img.src ? img.src.trim() : "";
          const hasPhoto = src.startsWith("data:image") || src.startsWith("blob:") || src.startsWith("http");

          if (!hasPhoto) {
            errorMsg = currentMessages.photo || "PHOTO REQUIRED!";
          }
        }
      }
    }
  }

  // Apply Error UI for this question
  if (errorMsg) {
    qText.style.color = "red";
    qText.innerText = originalText + " (" + errorMsg + ")";
    if (!firstErrorField) firstErrorField = qText;
  }
}

// Final Decision
if (firstErrorField) {
  firstErrorField.scrollIntoView({ behavior: 'smooth', block: 'center' });
  alert(currentMessages.pending || "Please correct the highlighted fields.");
  submitBtn.innerText = (currentMessages?.next || "Submit and move to next page");
  submitBtn.disabled = false;
  hideOverlay();
  return false;
}
// ================= VALIDATION END =================

  // Iske niche aapka purana auditData collection wala logic rahega...
  
  const auditData = {
    // ✅ ADDED
    submissionId: submissionId || "",
    pageNo: currentPage,
    isFinal: (currentPage === totalPages),
    state: document.getElementById('state').value,
    branch: document.getElementById('branch').value,
    branchHead: document.getElementById('branchHead').value,
    officeBoy: document.getElementById('officeBoy').value,
    responses: {}
  };

  // ✅ IMPORTANT: Page 1 submit = NEW audit = NEW submissionId (new row)
if (currentPage === 1) {
  submissionId = makeId();
  localStorage.setItem("submissionId", submissionId);
  auditData.submissionId = submissionId;
} else if (!submissionId) {
  // safety fallback (agar kisi reason se id missing ho)
  submissionId = makeId();
  localStorage.setItem("submissionId", submissionId);
  auditData.submissionId = submissionId;
}


  // ✅ CHANGED: collect only current page questions
  const r2 = PAGE_RANGES[currentPage] || { start: 1, end: 18 };
  for (let i = r2.start; i <= r2.end; i++) {
    let qid = 'q' + i;
    let radio = document.querySelector(`input[name="${qid}"]:checked`);
    let img = document.getElementById(qid + 'Img');

 // ✅ ADDED: Q21 multi-photo data
if (qid === "q21") {
  const wrap = document.getElementById("q21Photos");
  const imgs = wrap ? wrap.querySelectorAll("img.preview-img") : [];
  const photos = Array.from(imgs)
    .map(im => im.src)
    .filter(src => src && src.startsWith("data:image"));

  auditData.responses[qid] = {
    answer: radio ? radio.value : "",
    photos
  };
  continue;
}

    /// ✅ ADDED: Q25 extinguisher data
if (qid === "q25") {
  const count = document.getElementById("q25Count")?.value || "";
  const n = parseInt(count || "0", 10);
  const photos = [];
  const expiryDates = [];

  for (let k = 1; k <= n; k++) {
    const imgK = document.getElementById("q25Img" + k);
    const expK = document.getElementById("q25Exp" + k);

<script>
function toggle(id,show){
 document.getElementById(id).style.display = show ? "block" : "none";
}


// ✅ ADDED: Q21 Multi-photo helpers
function addMorePhoto(containerId){
  const wrap = document.getElementById(containerId);
  const div = document.createElement("div");
  div.style.marginBottom = "10px";

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  const img = document.createElement("img");
  img.className = "preview-img";
  img.style.display = "none";

  input.onchange = (e)=> {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      img.src = ev.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  };

  const removeBtn = document.createElement("button");
  removeBtn.type = "button";
  removeBtn.innerText = "✖";
  removeBtn.style.marginLeft = "10px";
  removeBtn.onclick = ()=> div.remove();

  div.appendChild(input);
  div.appendChild(removeBtn);
  div.appendChild(document.createElement("br"));
  div.appendChild(img);
  wrap.appendChild(div);
}

function hasAnyPhotoInContainer(containerId){
  const wrap = document.getElementById(containerId);
  if(!wrap) return false;
  const imgs = wrap.querySelectorAll("img.preview-img");
  return Array.from(imgs).some(im => im.src && im.src.startsWith("data:image"));
}

// ✅ ADDED: auto 1 photo input for Q21
document.addEventListener("DOMContentLoaded", () => {
  // ✅ Q21: auto 1 photo input
  const w = document.getElementById("q21Photos");
  if (w && w.children.length === 0) addMorePhoto("q21Photos");

  // ✅ Q25: dropdown options 1..15 fill
  initQ25CountOptions();
});

// ✅ Q25: Fill dropdown 1..15 (run once)
function initQ25CountOptions(){
  const sel = document.getElementById("q25Count");
  if(!sel) return;

  if (sel.options.length > 1) return;

  for(let i=1;i<=15;i++){
    const o = document.createElement("option");
    o.value = String(i);
    o.text = String(i);
    sel.add(o);
  }
}

function renderFireExtinguishers(n){
  const wrap = document.getElementById("q25Items");
  if (!wrap) return;
  wrap.innerHTML = "";
  const count = parseInt(n || "0", 10);
  if(!count) return;

  for(let i=1;i<=count;i++){
    wrap.insertAdjacentHTML("beforeend", `
      <div style="border:1px solid #ddd;padding:10px;margin:10px 0;">
        <b>Fire Extinguisher ${i}</b><br><br>
        <label>Expiry / Servicing Validity Date</label><br>

  }
}

function loadBranches(){
  const stateEl = document.getElementById("state");

  if (!stateEl || !branchEl) return;

  branchEl.innerHTML = "";
  (branchMap[stateEl.value] || []).forEach(b => {
    const o = document.createElement("option");
    o.text = o.value = b;
    branchEl.add(o);
  });

  checkConditions();
}

function checkConditions(){
  const branchEl = document.getElementById("branch");
  const tradeSectionEl = document.getElementById("tradeSection");
  const isoSectionEl = document.getElementById("isoSection");
  if (!branchEl) return;

}

function showPreview(event, imgId) {
  const file = event.target.files[0];
  const preview = document.getElementById(imgId);
  
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.style.display = "block"; // Image select hote hi dikh jayegi
    };
    reader.readAsDataURL(file);
  }
}
