<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title></title>

  <style>
    :root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --muted:#5b6b84;
  --text:#0f172a;
  --accent:#2563eb;
  --danger:#dc2626;
  --ok:#16a34a;
  --border:rgba(15,23,42,.12);
}    
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:980px; margin:0 auto; padding:14px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; }
    .col{ flex:1 1 260px; min-width:260px; }
    .label{ display:block; font-size:14px; font-weight:600; color:var(--text); margin:10px 0 6px; }
    select,input[type="text"],input[type="number"],input[type="date"]{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border);
      background:rgba(255,255,255,.04); color:var(--text); outline:none;
    }
    select, option{
  background:#fff;
  color:#0f172a;
}
    input::placeholder{ color:rgba(230,238,252,.45); }
    .pages{ margin-top:12px; }
    .form-page{ display:none; }
    .form-page.active{ display:block; }
    .q{ border:1px solid var(--border); border-radius:14px; padding:12px; margin:12px 0; background:rgba(255,255,255,.02); }
    .q.err{ border-color:rgba(255,77,79,.75); box-shadow:0 0 0 2px rgba(255,77,79,.12) inset; }
    .q-title{ font-weight:600; line-height:1.35; }
    .q-sub{ font-size:12px; color:var(--muted); margin-top:4px; }
    .radios{ display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
    .chip{
      display:flex; align-items:center; gap:8px; padding:8px 10px;
      border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.03);
    }
    .chip input{ transform:scale(1.1); }
    .inline{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .inline .mini{ flex:1 1 180px; min-width:180px; }
    .hint{ font-size:12px; color:var(--muted); margin-top:8px; }
    .err-msg{ font-size:12px; color:rgba(255,77,79,.95); margin-top:8px; min-height:16px; }
    .btnbar{
      display:flex; justify-content:space-between; gap:12px; margin-top:14px;
      position:sticky; bottom:10px; padding:10px; background:linear-gradient(180deg, rgba(11,18,32,0), rgba(11,18,32,.85));
      backdrop-filter: blur(6px);
    }
    button{
      border:1px solid var(--border); border-radius:14px; padding:12px 14px;
      background:rgba(255,255,255,.04); color:var(--text); font-weight:600;
      flex:1; cursor:pointer;
    }
    button.primary{ background:rgba(74,163,255,.18); border-color:rgba(74,163,255,.35); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .thumbs{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .thumb{
      width:84px; height:84px; border-radius:12px; border:1px solid var(--border);
      background-size:cover; background-position:center; position:relative; overflow:hidden;
    }
    .x{
      position:absolute; top:6px; right:6px; width:26px; height:26px; border-radius:999px;
      border:1px solid var(--border); background:rgba(0,0,0,.35); color:var(--text);
      display:grid; place-items:center; font-weight:800; line-height:1; cursor:pointer;
    }
    .overlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55); padding:14px;
    }
    .overlay.show{ display:flex; }
    .modal{ max-width:420px; width:100%; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; }
    .modal h3{ margin:0 0 8px; }
    .modal p{ margin:0; color:var(--muted); }
    .assetRow{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .assetName{ flex:1 1 260px; min-width:260px; }
    .input-error{border: 2px solid red !important; background: #fff5f5; }
  </style>
</head>

  const wrap = document.getElementById(wrapId);

  qids.forEach(qid=>{

    if(qid===HR){
      wrap.appendChild(renderHRQ38());

    }
    if(qid===FIRE){
      wrap.appendChild(renderFireQ25());
      return;
    }
    if(qid===AC){
      wrap.appendChild(renderACQ39());
      return;
    }

    const isPolicy = POLICY.has(qid);
    const isMulti = MULTI_1_5.has(qid);

// ✅ Mobile-Optimized Compression & Processing
async function fileToCompressedDataUrl(file, opts = {}) {
  const {
  maxW = 800,
  maxH = 800,
  quality = 0.45,
  mime = "image/jpeg"
} = opts;

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > maxW) {
            height *= maxW / width;
            width = maxW;
          }
        } else {
          if (height > maxH) {
            width *= maxH / height;
            height = maxH;
          }
        }

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
 const ctx = canvas.getContext("2d");
if (!ctx) return reject(new Error("Canvas context not available"));
ctx.drawImage(img, 0, 0, width, height);
        
        const compressedData = canvas.toDataURL(mime, quality);
        resolve(compressedData);
      };
      img.onerror = () => reject(new Error("Image Load Error"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("File Read Error"));
    reader.readAsDataURL(file);
  });
}

async function filesToDataUrls(files) {
  const arr = Array.from(files || []);
  const out = [];

  // fallback reader (no canvas)
  const readAsDataUrl = (f) => new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("File Read Error"));
    r.readAsDataURL(f);
  });

  for (const f of arr) {
    try {
      // 1) try compression
      const result = await fileToCompressedDataUrl(f, {
        maxW: 1024,
        maxH: 1024,
        quality: 0.5
      });
      if (result && typeof result === "string" && result.startsWith("data:")) {
        out.push(result);
      } else {
        // 2) fallback
        out.push(await readAsDataUrl(f));
      }
    } catch (err) {
      console.warn("Compression failed, using original:", err);
      try {
        out.push(await readAsDataUrl(f));
      } catch (e2) {
        console.error("Both compression + fallback failed:", e2);
      }
    }
  }

  return out;
}  
function renderThumbs(qid, key, dataUrls) {
  const t = document.getElementById(`${qid}_${key}_thumbs`);
  if (!t) return;
  t.innerHTML = "";

  // ✅ Array check taaki code crash na ho
  const list = Array.isArray(dataUrls) ? dataUrls : [];

  list.forEach((url, idx) => {
    // ✅ "HAS_PHOTO" marker ko skip karein taaki blank thumbnails na dikhen
    if (url === "HAS_PHOTO" || !url) return;

    const d = document.createElement("div");
    d.className = "thumb";
    d.style.backgroundImage = `url('${url}')`;

    const x = document.createElement("button");
    x.type = "button";
    x.className = "x";
    x.textContent = "×";
    
    // ✅ Delete action ko aur behtar banaya
    x.onclick = (e) => {
      e.stopPropagation(); // Parent click ko rokne ke liye
      const store = getStore();
      if (store.responses[qid] && store.responses[qid][key]) {
        store.responses[qid][key].splice(idx, 1);
        setStore(store);
        renderThumbs(qid, key, store.responses[qid][key]);
      }
    };
    
    d.appendChild(x);
    t.appendChild(d);
  });
}

/* ---- storage for per-page answers before save ---- */
function getStore(){
  if (window.MASTER_DATA && Object.keys(window.MASTER_DATA).length) return window.MASTER_DATA;
  try { return JSON.parse(localStorage.getItem("draft") || "{}"); }
  catch(e){ return {}; }
}
function setStore(store){
  // 1) RAM me poora store (photos ke saath)
  window.MASTER_DATA = store || {};

  // 2) localStorage ke liye deep clone
  const draftForDisk = JSON.parse(JSON.stringify(store || {}));

  const stripPhotos = (obj) => {
    if (obj == null) return;

    if (Array.isArray(obj)) {
      for (let i = 0; i < obj.length; i++) {
        const v = obj[i];
        if (typeof v === "string" && v.startsWith("data:")) {
          obj[i] = "HAS_PHOTO";
        } else if (v && typeof v === "object") {
          stripPhotos(v);
        }
      }
      return;
    }

    if (typeof obj === "object") {
      Object.keys(obj).forEach((k) => {
        const v = obj[k];
        if (typeof v === "string" && v.startsWith("data:")) {
          obj[k] = "HAS_PHOTO";
        } else if (v && typeof v === "object") {
          stripPhotos(v);
        }
      });
    }
  };

  stripPhotos(draftForDisk);

  try {
    localStorage.setItem("draft", JSON.stringify(draftForDisk));
  } catch (e) {
    console.warn("localStorage limit reached, but RAM is holding your photos.");
    try {
      localStorage.removeItem("draft");
      localStorage.setItem("draft_meta", JSON.stringify({
        savedAt: Date.now(),
        hasPhotos: true
      }));
    } catch (_) {}
  }
}
  
/* ---- question renderers ---- */
function renderYnOnly(qid){
  const box = qBoxBase(qid);
  box.appendChild(radiosYesNo(qid, ()=>{
    const store = getStore();
    store.responses = store.responses || {};
    store.responses[qid] = store.responses[qid] || {};
    store.responses[qid].answer = getRadio(qid);
    setStore(store);
    setErr(qid,"");
  }));
  restoreRadio(qid);
  return box;
}

function renderYnPhoto(qid, minPhotos, maxPhotos){
  const box = qBoxBase(qid);

  const photoWrap = document.createElement("div");
  photoWrap.style.display = "none";
  photoWrap.id = `wrap_${qid}_photo`;

  const lab = document.createElement("div");
  lab.className = "label";
  lab.textContent = L("photo");
  photoWrap.appendChild(lab);

  const inp = fileInput(qid, "photo", maxPhotos > 1, true);
  photoWrap.appendChild(inp);

  const thumbs = thumbsArea(qid, "photos");
  photoWrap.appendChild(thumbs);

  function ensureStoreShape(){
    const store = getStore();
    store.responses = store.responses || {};
    store.responses[qid] = store.responses[qid] || {};
    store.responses[qid].photos = Array.isArray(store.responses[qid].photos)
  ? store.responses[qid].photos.filter(v => v && v !== "HAS_PHOTO")
  : [];
    return store;
  }

  box.appendChild(radiosYesNo(qid, (val)=>{
    const show = (val === "Y");
    photoWrap.style.display = show ? "block" : "none";

    const store = ensureStoreShape();
    store.responses[qid].answer = val;
    if (!show) store.responses[qid].photos = [];
    setStore(store);

    setErr(qid, "");
    if (!show) {
      clearThumbs(qid, "photos");
    } else {
      const list = store.responses[qid].photos || [];
      renderThumbs(qid, "photos", list);
    }
  }));

  inp.addEventListener("change", async ()=>{
    const store = ensureStoreShape();
    const prev = Array.isArray(store.responses[qid].photos)
  ? store.responses[qid].photos.filter(v => v && v !== "HAS_PHOTO")
  : [];

    const added = await filesToDataUrls(inp.files);
if (added.length) {
  const merged = (maxPhotos === 1)
    ? [added[0]]
    : prev.concat(added).slice(0, maxPhotos);

  store.responses[qid].photos = merged;
  setStore(store);
  renderThumbs(qid, "photos", merged);
  setErr(qid, "");
}
    inp.value = "";
  });

  box.appendChild(photoWrap);

  // restore
  restoreRadio(qid);
  const cur = getRadio(qid);
  photoWrap.style.display = (cur === "Y") ? "block" : "none";

  const store = ensureStoreShape();
  const list = store.responses[qid].photos || [];
  if (cur === "Y") renderThumbs(qid, "photos", list);

  return box;
}

function renderPolicy(qid){
  const box = qBoxBase(qid);

  const detail = document.createElement("div");
  detail.style.display = "none";
  detail.id = `wrap_${qid}_policy`;

  const inline = document.createElement("div");
  inline.className = "inline";

  const v = document.createElement("div"); v.className="mini";
  const vLab = document.createElement("div"); vLab.className="label"; vLab.textContent = L("versionLabel") || "Version No";

function renderMultiPhoto(qid, min, max){
  const box = qBoxBase(qid);

  const wrap = document.createElement("div");
  wrap.style.display = "none";
  wrap.id = `wrap_${qid}_multi`;

  const lab = document.createElement("div");
  lab.className = "label";
  lab.textContent = (qid === "q21")
    ? L("firstAidTip")
    : L("photo");
  wrap.appendChild(lab);

  // hidden input: camera open (1 photo at a time)
  const inp = fileInput(qid, "multi", false, true); // multiple=false, capture=true
  inp.style.display = "none";
  wrap.appendChild(inp);

  // button shown to user
  const btn = document.createElement("button");
  btn.type = "button";
  btn.style.marginTop = "8px";
  wrap.appendChild(btn);

  // thumbs area
  wrap.appendChild(thumbsArea(qid, "photos"));

  function ensureStoreShape(){
    const store = getStore();
    store.responses = store.responses || {};
    store.responses[qid] = store.responses[qid] || {};
    store.responses[qid].photos = Array.isArray(store.responses[qid].photos)
      ? store.responses[qid].photos.filter(v => v && v !== "HAS_PHOTO")
      : [];
    return store;
  }

  function getPhotos(){
    const store = ensureStoreShape();
    return store.responses[qid].photos || [];
  }

  function updateBtn(){
    const n = getPhotos().length;
    btn.textContent = (n === 0) ? "Capture photo" : `Add more photo (${n}/${max})`;
    btn.disabled = (n >= max);
  }

  function repaint(){
    const list = getPhotos();
    renderThumbs(qid, "photos", list);
    updateBtn();
  }

  btn.onclick = () => inp.click();

  box.appendChild(radiosYesNo(qid, (val)=>{
    const show = (val === "Y");
    wrap.style.display = show ? "block" : "none";

    const store = ensureStoreShape();
    store.responses[qid].answer = val;

    if (!show) {
      store.responses[qid].photos = [];
      clearThumbs(qid, "photos");
    }

    setStore(store);
    setErr(qid, "");

    if (show) repaint();
  }));

  inp.addEventListener("change", async ()=>{
    const store = ensureStoreShape();
    const prev = Array.isArray(store.responses[qid].photos)
      ? store.responses[qid].photos.filter(v => v && v !== "HAS_PHOTO")
      : [];

    const added = await filesToDataUrls(inp.files);
    if (added.length) {
      store.responses[qid].photos = prev.concat([added[0]]).slice(0, max);
      setStore(store);
      repaint();
      setErr(qid, "");
    }
    inp.value = "";
  });

  box.appendChild(wrap);

  // restore
  restoreRadio(qid);
  const cur = getRadio(qid);
  wrap.style.display = (cur === "Y") ? "block" : "none";

  const store = ensureStoreShape();
  const list = store.responses[qid].photos || [];
  if (cur === "Y") {
    renderThumbs(qid, "photos", list);
    updateBtn();
  }

  return box;
}

function renderSingleThumb(thumbsId, url, onRemove){
  const t = document.getElementById(thumbsId);
  if(!t) return;
  t.innerHTML = "";
  if(!url) return;

  const d = document.createElement("div");
  d.className = "thumb";
  d.style.width = "64px";
  d.style.height = "64px";
  d.style.minWidth = "64px";
  d.style.backgroundImage = `url('${url}')`;
  d.style.backgroundSize = "cover";
  d.style.backgroundPosition = "center";
  d.style.backgroundRepeat = "no-repeat";
  d.style.borderRadius = "8px";
  d.style.position = "relative";
  d.style.display = "inline-block";
  d.style.marginTop = "4px";

  const x = document.createElement("button");
  x.type = "button";
  x.className = "x";
  x.textContent = "×";
  x.onclick = onRemove;
  x.style.position = "absolute";
  x.style.top = "-6px";
  x.style.right = "-6px";
  x.style.width = "20px";
  x.style.height = "20px";
  x.style.lineHeight = "18px";
  x.style.padding = "0";
  x.style.borderRadius = "50%";
  x.style.fontSize = "14px";

  d.appendChild(x);
  t.appendChild(d);
}

      : [];

function renderAssetsQ42(){
  const qid="q42";
  const box = qBoxBase(qid);

  const br = branchEl.value || "";
  const assets = (branchAssetList?.[br] || []);

  const hint = document.createElement("div");
  hint.className="hint";
  hint.textContent = L("assetsHint") || "";
  box.appendChild(hint);

  const area = document.createElement("div");
  area.id="q42_area";
  box.appendChild(area);

  // store structure: responses.q42.assets = { CODE: {answer:"Y/N", photos:[...] } }
  const store=getStore();
  store.responses = store.responses || {};
  store.responses.q42 = store.responses.q42 || {};
  store.responses.q42.assets = store.responses.q42.assets || {};
  setStore(store);

  assets.forEach((assetObj, idx)=>{
    // support both string list OR object list
    const code = (typeof assetObj==="string") ? assetObj : (assetObj.code || assetObj.asset || assetObj.id || String(idx+1));
    const label = (typeof assetObj==="string") ? assetObj : (assetObj.label || assetObj.name || assetObj.desc || code);

    const row = document.createElement("div");
    row.className="q";
    row.id = `q42_${code}`;

    const top = document.createElement("div");
    top.className="assetRow";

    const name = document.createElement("div");
    name.className="assetName";
    const t=document.createElement("div");
    t.className="q-title";
    t.textContent = label;
    name.appendChild(t);

    const err=document.createElement("div");
    err.className="err-msg";
    err.id = `err_q42_${code}`;
    name.appendChild(err);

    top.appendChild(name);

    const radios = document.createElement("div");
    radios.className="radios";
    radios.style.marginTop="0";

    const y = document.createElement("label");
    y.className="chip";
    y.innerHTML = `<input type="radio" name="q42_${code}" value="Y"> <span>${L("y")}</span>`;
    const n = document.createElement("label");
    n.className="chip";
    n.innerHTML = `<input type="radio" name="q42_${code}" value="N"> <span>${L("n")}</span>`;
    radios.appendChild(y); radios.appendChild(n);
    top.appendChild(radios);

    row.appendChild(top);

    const photoWrap = document.createElement("div");
    photoWrap.style.display="none";
    photoWrap.id = `wrap_q42_${code}`;

    const pLab=document.createElement("div");
    pLab.className="label";
    pLab.textContent=L("photo");
    photoWrap.appendChild(pLab);

    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.setAttribute("capture","environment");
    inp.id=`q42_${code}_photo`;
    photoWrap.appendChild(inp);

    const thumbs=document.createElement("div");
    thumbs.className="thumbs";
    thumbs.id=`q42_${code}_thumbs`;
    photoWrap.appendChild(thumbs);

    row.appendChild(photoWrap);

    radios.querySelectorAll("input").forEach(r=>{
      r.addEventListener("change", ()=>{
        const val = getRadio(`q42_${code}`);
        const show = (val==="Y");
        photoWrap.style.display = show ? "block" : "none";

        const store=getStore();
        store.responses = store.responses || {};
        store.responses.q42 = store.responses.q42 || {};
        store.responses.q42.assets = store.responses.q42.assets || {};
        store.responses.q42.assets[code] = store.responses.q42.assets[code] || {};
        store.responses.q42.assets[code].answer = val;
        if(!show) store.responses.q42.assets[code].photos = [];
        setStore(store);

        // clear error
        document.getElementById(`err_q42_${code}`).textContent="";
        row.classList.remove("err");

        // restore thumb if needed
        const url = store.responses.q42.assets[code].photos?.[0] || "";
        renderSingleThumb(`q42_${code}_thumbs`, url, ()=>{
          const s=getStore();
          s.responses.q42.assets[code].photos=[];
          setStore(s);
          renderSingleThumb(`q42_${code}_thumbs`, "", ()=>{});
        });
      });
    });

    inp.addEventListener("change", async ()=>{
      const added = await filesToDataUrls(inp.files);
      const store=getStore();
      store.responses = store.responses || {};
      store.responses.q42 = store.responses.q42 || {};
      store.responses.q42.assets = store.responses.q42.assets || {};
      store.responses.q42.assets[code] = store.responses.q42.assets[code] || {};
      store.responses.q42.assets[code].photos = (added[0] ? [added[0]] : []);
      setStore(store);

      renderSingleThumb(`q42_${code}_thumbs`, store.responses.q42.assets[code].photos[0] || "", ()=>{
        const s=getStore();
        s.responses.q42.assets[code].photos=[];
        setStore(s);
        renderSingleThumb(`q42_${code}_thumbs`, "", ()=>{});
      });

      document.getElementById(`err_q42_${code}`).textContent="";
      row.classList.remove("err");
      inp.value="";
    });

    // restore selection + thumb
    const store2=getStore();
    const saved = store2?.responses?.q42?.assets?.[code] || {};
    if(saved.answer){
      const rr = document.querySelector(`input[name="q42_${code}"][value="${saved.answer}"]`);
      if(rr) rr.checked = true;
      photoWrap.style.display = (saved.answer==="Y") ? "block" : "none";
      renderSingleThumb(`q42_${code}_thumbs`, saved.photos?.[0] || "", ()=>{
        const s=getStore();
        s.responses.q42.assets[code].photos=[];
        setStore(s);
        renderSingleThumb(`q42_${code}_thumbs`, "", ()=>{});
      });
    }

    area.appendChild(row);
  });

  return box;
}

  return document.querySelector(`input[name="${qid}"]:checked`)?.value || "";
}
function restoreRadio(qid){
  const store = getStore();
  const val = store?.responses?.[qid]?.answer || "";
  if(val){
    const el = document.querySelector(`input[name="${qid}"][value="${val}"]`);
    if(el) el.checked = true;
  }
}
function firstErrorScroll(el){
  if(!el) return;
  el.scrollIntoView({behavior:"smooth", block:"center"});
}

function validatePage(pageNo){
  // clear all errors in visible page area
  document.querySelectorAll(`#page${pageNo} .input-error`).forEach(el=>el.classList.remove("input-error"));
  document.querySelectorAll(`#page${pageNo} .q`).forEach(q=>q.classList.remove("err"));
  document.querySelectorAll(`#page${pageNo} .err-msg`).forEach(e=>{ if(e.id.startsWith("err_")) e.textContent=""; });

  let firstBad = null;

  const store = getStore();
  store.responses = store.responses || {};
  setStore(store);

  // Basic details validation on page1
  if(pageNo===1){
    // required: state, branch, branchHead, officeBoy
    if(!stateEl.value){
      firstBad = firstBad || document.getElementById("state");
      stateEl.style.borderColor = "rgba(255,77,79,.75)";
    } else stateEl.style.borderColor = "var(--border)";

    if(!branchEl.value){
      firstBad = firstBad || document.getElementById("branch");
      branchEl.style.borderColor = "rgba(255,77,79,.75)";
    } else branchEl.style.borderColor = "var(--border)";

    const bh = document.getElementById("branchHead");
    const ob = document.getElementById("officeBoy");
    if(!bh.value.trim()){
      firstBad = firstBad || bh;
      bh.style.borderColor = "rgba(255,77,79,.75)";
    } else bh.style.borderColor = "var(--border)";
    if(!ob.value.trim()){
      firstBad = firstBad || ob;
      ob.style.borderColor = "rgba(255,77,79,.75)";
    } else ob.style.borderColor = "var(--border)";
  }

  // question lists per page
  const pageQ = {
    1: [...Array(18)].map((_,i)=>"q"+(i+1)),
    2: [...Array(9)].map((_,i)=>"q"+(i+19)),
    3: [...Array(10)].map((_,i)=>"q"+(i+28)),
    4: ["q38"],
    5: ["q39","q40","q41"],
    6: ["q42"]
  }[pageNo] || [];

  // validate each visible q
  for(const qid of pageQ){
    if(!shouldShowQuestion(qid)) continue;

    if(qid==="q42"){
      const br = branchEl.value || "";
      const assets = (branchAssetList?.[br] || []);
      const s = getStore();
      const aset = s?.responses?.q42?.assets || {};
      for(const assetObj of assets){
        const code = (typeof assetObj==="string") ? assetObj : (assetObj.code || assetObj.asset || assetObj.id);
        const row = document.getElementById(`q42_${code}`);
        const ans = document.querySelector(`input[name="q42_${code}"]:checked`)?.value || "";
        if(!ans){
          if(row){ row.classList.add("err"); document.getElementById(`err_q42_${code}`).textContent = L("required") || ""; }
          firstBad = firstBad || row;
          continue;
        }
        if(ans==="Y"){
          const photos = aset?.[code]?.photos || [];
          if(!photos[0]){
            if(row){ row.classList.add("err"); document.getElementById(`err_q42_${code}`).textContent = L("photoMissing") || L("photo") || ""; }
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    if(qid==="q38"){
      const photos = getStore()?.responses?.q38?.photos || [];
      if(photos.length < 5){
        setErr("q38", L("photoMissing") || L("photo") || "");
        firstBad = firstBad || document.getElementById("box_q38");
      }
      continue;
    }

    if(qid==="q25"){
      const s=getStore();
      const n = Number(s?.responses?.q25?.count || 0);
      if(!n){
        setErr("q25", L("required") || "");
        firstBad = firstBad || document.getElementById("box_q25");
      } else {
        for(let i=1;i<=n;i++){
          const it = s.responses.q25.items?.[i-1] || {};
          const row = document.getElementById(`q25_item_${i}`);
          const err = document.getElementById(`err_q25_${i}`);
          if(!it.photo || !it.expiryDate){
            if(row) row.classList.add("err");
            if(err) err.textContent = L("required") || "";
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    if(qid==="q39"){
      const s=getStore();
      const n = Number(s?.responses?.q39?.count || 0);
      if(!n){
        setErr("q39", L("required") || "");
        firstBad = firstBad || document.getElementById("box_q39");
      } else {
        for(let i=1;i<=n;i++){
          const url = s.responses.q39.photos?.[i-1] || "";
          const row = document.getElementById(`q39_item_${i}`);
          const err = document.getElementById(`err_q39_${i}`);
          if(!url){
            if(row) row.classList.add("err");
            if(err) err.textContent = L("photoMissing") || L("photo") || "";
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    const ans = getRadio(qid);
if(!ans){
  setErr(qid, L("select") || L("required") || "Please select Yes/No");
  firstBad = firstBad || document.getElementById("box_"+qid);
  continue;
}

// policy (Q3-Q10)
if (POLICY.has(qid) && ans === "Y") {

  const s = getStore();
  const r = s?.responses?.[qid] || {};

  // Get inputs
  const versionInput = document.getElementById(qid + "_version");
  const issueInput = document.getElementById(qid + "_issueDate");
  const effectiveInput = document.getElementById(qid + "_effectiveDate");

  // Reset previous error style
  [versionInput, issueInput, effectiveInput].forEach(el=>{
    if(el) el.classList.remove("input-error");
  });

  // -------- VERSION CHECK --------
  const vStr = String(r.version || "").trim();
  const vOk = vStr !== "" && /^\d+(\.\d{1,2})?$/.test(vStr);

  // -------- DATE CHECK (2019–2029 only) --------
  const iVal = String(r.issueDate || "").trim();
  const eVal = String(r.effectiveDate || "").trim();

const iD = iVal ? new Date(iVal + "T00:00:00") : null;
const eD = eVal ? new Date(eVal + "T00:00:00") : null;

  const iOk = iD && !isNaN(iD.getTime());
  const eOk = eD && !isNaN(eD.getTime());

  const iYearOk = iOk && iD.getFullYear() >= 2019 && iD.getFullYear() <= 2029;
  const eYearOk = eOk && eD.getFullYear() >= 2019 && eD.getFullYear() <= 2029;

  // -------- PHOTO CHECK --------
  const pOk = (r.photos || [])[0];

  // -------- VALIDATION --------
  if (!vOk) {
    setErr(qid, L("version"));
    if(versionInput) versionInput.classList.add("input-error");
    firstBad = firstBad || document.getElementById("box_" + qid);
  }
  else if (!iOk || !eOk || !iYearOk || !eYearOk) {
    setErr(qid, L("date"));
    if(issueInput) issueInput.classList.add("input-error");
    if(effectiveInput) effectiveInput.classList.add("input-error");
    firstBad = firstBad || document.getElementById("box_" + qid);
  }
  else if (!pOk) {
    setErr(qid, L("photo"));
    firstBad = firstBad || document.getElementById("box_" + qid);
  }

  continue;
}

    // yes->photo required for yn+photo & multi
    const needsPhoto =
      (YN_PHOTO.has(qid) && ans==="Y") ||
      (MULTI_1_5.has(qid) && ans==="Y");

    if(needsPhoto){
      const s=getStore();
      const photos = s?.responses?.[qid]?.photos || [];
      const min = MULTI_1_5.has(qid) ? 1 : 1;
      if(photos.length < min){
        setErr(qid, L("photoMissing") || L("photo") || "");
        firstBad = firstBad || document.getElementById("box_"+qid);
      }
    }
  }

  if(firstBad){
    // scroll
    firstErrorScroll(firstBad);
    return false;
  }
  return true;
}

/* ================= SECTION: SUBMIT & SAVE ================= */
function buildPayload(pageNumber){
  const store = getStore();
  const payload = {
    submissionId: submissionId || "",
    pageNumber,
    state: stateEl.value || "",
    branch: branchEl.value || "",
    branchHead: (document.getElementById("branchHead").value || "").trim(),
    officeBoy: (document.getElementById("officeBoy").value || "").trim(),
    responses: store.responses || {}
  };
  return payload;
}

async function onSubmitNext(){
  // validate
  if(!validatePage(currentPage)) return;

  // lock button + show pending
  const btn = document.getElementById("next"+currentPage);
  const old = btn.textContent;
  btn.disabled = true;
  btn.textContent = L("pending") || old;

  // persist basic fields to draft
  const store = getStore();
  store.basic = {
    state: stateEl.value || "",
    branch: branchEl.value || "",
    branchHead: (document.getElementById("branchHead").value || "").trim(),
    officeBoy: (document.getElementById("officeBoy").value || "").trim()
  };
  setStore(store);

  try{
    startProgress(L("wait") || "Please wait...");
    const payload = buildPayload(currentPage);
    const res = await fetch(APPS_SCRIPT_URL, {
  method: "POST",
  body: JSON.stringify(payload), // text/plain by default => no preflight
});
    const data = await res.json().catch(()=> ({}));
 finishProgress(L("success") || "Success"); 
    if(data && data.submissionId){
      submissionId = String(data.submissionId);
      localStorage.setItem("submissionId", submissionId);
    }

    // success behavior
    if(currentPage < 6){
      showPage(currentPage + 1);
    } else {
      // final success popup + reset
      showSuccess();
      resetAll();
    }
 }catch(err){
  finishProgress("Error! Try again.");
  clearInterval(window.progressInterval);
  console.error(err);
}finally{
  btn.disabled = false;
  btn.textContent = (currentPage===6 ? (L("submit") || L("next")) : (L("next"))) || old;
}
}

function showSuccess(){
  const ov = document.getElementById("overlay");
  setText("okTitle", L("success") || "");
  setText("okSub", L("successSub") || "");
  ov.classList.add("show");
  ov.setAttribute("aria-hidden","false");
  setTimeout(()=>{ ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); }, 1600);
}
  function hardResetFormState(){
  // localStorage se saved draft hatao
  try { localStorage.removeItem("draft"); } catch(e){}
  try { localStorage.removeItem("submissionId"); } catch(e){}
window.PHOTO_CACHE = {};   // ✅ clear photo thumbs cache
  // in-memory id bhi reset
  submissionId = "";

  // UI fields clear
  if (stateEl) stateEl.value = "";
  if (branchEl) branchEl.value = "";
  const bh = document.getElementById("branchHead");
  const ob = document.getElementById("officeBoy");
  if (bh) bh.value = "";
  if (ob) ob.value = "";

  // language reset
  lang = "en";
}

function resetAll(){
    window.MASTER_DATA = {};   // ✅ RAM wala old data clear
  window.PHOTO_CACHE = {};   // ✅ thumbnail cache clear
  // clear draft
  localStorage.removeItem("draft");
  // keep submissionId? no; fresh submission
  localStorage.removeItem("submissionId");
  submissionId = "";

  // reset UI
  stateEl.value = "";
  lang = "en";
  renderAll();

  document.getElementById("branchHead").value = "";
  document.getElementById("officeBoy").value = "";

  showPage(1);
}

/* ========== INIT ========== */
// First load
document.addEventListener("DOMContentLoaded", () => {
  renderStateDropdown();     // ✅ same as before
  hardResetFormState();      // ✅ start fresh (draft + submissionId clear)
  renderAll();               // ✅ render UI
  showPage(1);               // ✅ go to first page
});

// Mobile back / recent apps cache fix (bfcache)
window.addEventListener("pageshow", (e) => {
  if (e.persisted) {
    renderStateDropdown();
    hardResetFormState();
    renderAll();
    showPage(1);
  }
});
function startProgress(msg){
  const ov = document.getElementById("overlay");
  const wrap = document.getElementById("ovProgress");
  const bar = document.getElementById("ovBar");
  const m = document.getElementById("ovMsg");

  // show overlay
 setText("okTitle", "");
setText("okSub", "");
wrap.style.display = "block";
m.innerText = msg;

  ov.classList.add("show");
  ov.setAttribute("aria-hidden","false");

  bar.style.width = "0%";
  let p = 0;
  clearInterval(window.progressInterval);
  window.progressInterval = setInterval(()=>{
    if(p < 90){
      p += 5;
      bar.style.width = p + "%";
    }
  },2250);
}

function finishProgress(msg){
  const ov = document.getElementById("overlay");
  const wrap = document.getElementById("ovProgress");
  const bar = document.getElementById("ovBar");
  const m = document.getElementById("ovMsg");

  clearInterval(window.progressInterval);

  bar.style.width = "100%";
  setText("okTitle", msg);
  setText("okSub", "");

  setTimeout(()=>{
    wrap.style.display = "none";
    ov.classList.remove("show");
    ov.setAttribute("aria-hidden","true");
  }, 900);
}
