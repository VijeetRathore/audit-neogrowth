<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title></title>

  <style>
    :root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --muted:#5b6b84;
  --text:#0f172a;
  --accent:#2563eb;
  --danger:#dc2626;
  --ok:#16a34a;
  --border:rgba(15,23,42,.12);
}    
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:980px; margin:0 auto; padding:14px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; }
    .col{ flex:1 1 260px; min-width:260px; }
    .label{ font-size:13px; color:var(--muted); margin:8px 0 6px; }
    select,input[type="text"],input[type="number"],input[type="date"]{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border);
      background:rgba(255,255,255,.04); color:var(--text); outline:none;
    }
    select, option{
  background:#fff;
  color:#0f172a;
}
    input::placeholder{ color:rgba(230,238,252,.45); }
    .pages{ margin-top:12px; }
    .form-page{ display:none; }
    .form-page.active{ display:block; }
    .q{ border:1px solid var(--border); border-radius:14px; padding:12px; margin:12px 0; background:rgba(255,255,255,.02); }
    .q.err{ border-color:rgba(255,77,79,.75); box-shadow:0 0 0 2px rgba(255,77,79,.12) inset; }
    .q-title{ font-weight:600; line-height:1.35; }
    .q-sub{ font-size:12px; color:var(--muted); margin-top:4px; }
    .radios{ display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
    .chip{
      display:flex; align-items:center; gap:8px; padding:8px 10px;
      border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.03);
    }
    .chip input{ transform:scale(1.1); }
    .inline{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .inline .mini{ flex:1 1 180px; min-width:180px; }
    .hint{ font-size:12px; color:var(--muted); margin-top:8px; }
    .err-msg{ font-size:12px; color:rgba(255,77,79,.95); margin-top:8px; min-height:16px; }
    .btnbar{
      display:flex; justify-content:space-between; gap:12px; margin-top:14px;
      position:sticky; bottom:10px; padding:10px; background:linear-gradient(180deg, rgba(11,18,32,0), rgba(11,18,32,.85));
      backdrop-filter: blur(6px);
    }
    button{
      border:1px solid var(--border); border-radius:14px; padding:12px 14px;
      background:rgba(255,255,255,.04); color:var(--text); font-weight:600;
      flex:1; cursor:pointer;
    }
    button.primary{ background:rgba(74,163,255,.18); border-color:rgba(74,163,255,.35); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .thumbs{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .thumb{
      width:84px; height:84px; border-radius:12px; border:1px solid var(--border);
      background-size:cover; background-position:center; position:relative; overflow:hidden;
    }
    .x{
      position:absolute; top:6px; right:6px; width:26px; height:26px; border-radius:999px;
      border:1px solid var(--border); background:rgba(0,0,0,.35); color:var(--text);
      display:grid; place-items:center; font-weight:800; line-height:1; cursor:pointer;
    }
    .overlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55); padding:14px;
    }
    .overlay.show{ display:flex; }
    .modal{ max-width:420px; width:100%; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; }
    .modal h3{ margin:0 0 8px; }
    .modal p{ margin:0; color:var(--muted); }
    .assetRow{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .assetName{ flex:1 1 260px; min-width:260px; }
  </style>
</head>

/* ================= GLOBALS ================= */
let currentPage = 1;
let lang = "en";
let submissionId = localStorage.getItem("submissionId") || "";
const stateEl = document.getElementById("state");
const branchEl = document.getElementById("branch");

/* ================= UTIL: labels (no hardcode messages) ================= */
function L(key){
  return (msgLabels?.[lang]?.[key] ?? msgLabels?.["en"]?.[key] ?? "");
}
function setText(id, txt){ const el=document.getElementById(id); if(el) el.textContent = txt ?? ""; }

/* ================= SECTION: BUTTONS / NAV ================= */
function setButtons(){
  for(let p=1;p<=6;p++){
    const back = document.getElementById("back"+p);
    const next = document.getElementById("next"+p);
    if(back) back.textContent = L("back");
    if(next){
      const isLast = (p===6);
      // Prefer submit label on last page if available; else "next"
      next.textContent = isLast ? (L("submit") || L("next")) : L("next");
    }
    if(back) back.onclick = ()=>onBack();
    if(next) next.onclick = ()=>onSubmitNext();
  }
}
function showPage(p){
  currentPage = Number(p);
  document.querySelectorAll(".form-page").forEach(pg=>pg.classList.remove("active"));
  const el = document.getElementById("page"+currentPage);
  if(el) el.classList.add("active");
  window.scrollTo({top:0, behavior:"smooth"});
}
function onBack(){
  if(currentPage<=1) return;
  showPage(currentPage-1);
}

/* ================= SECTION: PAGE RENDER ================= */
function renderStaticTexts(){
  setText("topTitle", L("title") || "");
  setText("topSub", L("subtitle") || "");

  setText("lblState", L("state") || "");
  setText("lblBranch", L("branch") || "");
  setText("lblBranchHead", L("branchHead") || "");
  setText("lblOfficeBoy", L("officeBoy") || "");
}
function renderAll(){
  renderStaticTexts();
  renderBranchDropdown();   // state ke hisaab se branches update
  renderPageQuestions();
  setButtons();
}

function renderStateDropdown(){
  // no hardcoded placeholder text; first option blank
  stateEl.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = L("selectState") || "";
  stateEl.appendChild(opt0);

  const states = Object.keys(branchMap || {});
  states.forEach(st=>{
    const o=document.createElement("option");
    o.value=st; o.textContent=st; // state names are data, not UI labels
    stateEl.appendChild(o);
  });
stateEl.onchange = ()=>{
  lang = (STATE_LANG?.[stateEl.value] || "en");
  renderStaticTexts();
  renderBranchDropdown();
  branchEl.value = "";
  renderPageQuestions();
  setButtons();
};
}
function renderBranchDropdown(){
  if(!stateEl.value){
  branchEl.innerHTML = "";
  const opt = document.createElement("option");
  opt.value = "";
  opt.textContent = L("selectBranch") || "";
  branchEl.appendChild(opt);
  return;
}
  branchEl.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = L("selectBranch") || "";
  branchEl.appendChild(opt0);

  const branches = (branchMap?.[stateEl.value] || []);
  branches.forEach(b=>{
    const o=document.createElement("option");
    o.value=b; o.textContent=b;
    branchEl.appendChild(o);
  });

  branchEl.onchange = ()=>{
    // trade/iso + Q42 assets depend on branch
    renderPageQuestions();
  };
}

function renderPageQuestions(){
  // Page 1: q1-q18 (q17/q18 conditional)
  const p1 = [];
  for(let i=1;i<=18;i++) p1.push("q"+i);
  // Page 2: q19-q27
  const p2 = [];
  for(let i=19;i<=27;i++) p2.push("q"+i);
  // Page 3: q28-q37
  const p3 = [];
  for(let i=28;i<=37;i++) p3.push("q"+i);
  // Page 4: q38 only
  const p4 = ["q38"];
  // Page 5: q39-q41
  const p5 = ["q39","q40","q41"];
  // Page 6: q42 (assets)
  const p6 = ["q42"];

  renderQuestionList("qWrap1", p1, 1);
  renderQuestionList("qWrap2", p2, 2);
  renderQuestionList("qWrap3", p3, 3);
  renderQuestionList("qWrap4", p4, 4);
  renderQuestionList("qWrap5", p5, 5);
  renderQuestionList("qWrap6", p6, 6);
}

function shouldShowQuestion(qid){
  const br = branchEl.value || "";
  if(qid==="q17") return trade.includes(br);
  if(qid==="q18") return iso.includes(br);
  return true;
}

function qText(qid){
  // QUESTIONS[qid][lang] expected; else fallback en; else qid
  return (QUESTIONS?.[qid]?.[lang] ?? QUESTIONS?.[qid]?.["en"] ?? qid);
}

/* ---- question type mapping by q-number ranges ---- */
const YN_PHOTO = new Set(["q1","q2","q11","q12","q13","q14","q15","q16","q19","q20","q22","q23","q26","q27","q40","q41","q17","q18"]);
const POLICY = new Set(["q3","q4","q5","q6","q7","q8","q9","q10"]);
const MULTI_1_5 = new Set(["q21","q24","q28","q29","q30","q31","q32","q33","q34","q35","q37"]);
const FIRE = "q25";
const HR = "q38";
const AC = "q39";
const ASSETS = "q42";

function renderQuestionList(wrapId, qids, pageNo){
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = "";

  qids.forEach(qid=>{
    if(!shouldShowQuestion(qid)) return;

    if(qid===ASSETS){
      wrap.appendChild(renderAssetsQ42());
      return;
    }
    if(qid===HR){
      wrap.appendChild(renderHRQ38());
      return;
    }
    if(qid===FIRE){
      wrap.appendChild(renderFireQ25());
      return;
    }
    if(qid===AC){
      wrap.appendChild(renderACQ39());
      return;
    }

    const isPolicy = POLICY.has(qid);
    const isMulti = MULTI_1_5.has(qid);
    const isYnPhoto = YN_PHOTO.has(qid);

    if(isPolicy) wrap.appendChild(renderPolicy(qid));
    else if(isMulti) wrap.appendChild(renderMultiPhoto(qid, 1, 5));
    else if(isYnPhoto) wrap.appendChild(renderYnPhoto(qid, 1, 1));
    else {
      // default safest: Yes/No only (no extra)
      wrap.appendChild(renderYnOnly(qid));
    }
  });
}

/* ---- UI builders ---- */
function qBoxBase(qid){
  const box = document.createElement("div");
  box.className = "q";
  box.id = "box_"+qid;

  const t = document.createElement("div");
  t.className = "q-title";
  t.textContent = qText(qid);
  box.appendChild(t);

  const err = document.createElement("div");
  err.className = "err-msg";
  err.id = "err_"+qid;
  box.appendChild(err);

  return box;
}
function setErr(qid, msg){
  const box = document.getElementById("box_"+qid);
  const err = document.getElementById("err_"+qid);
  if(box) box.classList.toggle("err", !!msg);
  if(err) err.textContent = msg || "";
}
function radiosYesNo(qid, onChange){
  const r = document.createElement("div");
  r.className = "radios";

  const y = document.createElement("label");
  y.className = "chip";
  y.innerHTML = `<input type="radio" name="${qid}" value="Y"> <span>${L("y")}</span>`;
  const n = document.createElement("label");
  n.className = "chip";
  n.innerHTML = `<input type="radio" name="${qid}" value="N"> <span>${L("n")}</span>`;

  r.appendChild(y); r.appendChild(n);
  r.querySelectorAll("input").forEach(inp=>{
    inp.addEventListener("change", ()=>onChange?.(inp.value));
  });
  return r;
}
function fileInput(qid, key, multiple, acceptCapture){
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  if(acceptCapture) inp.setAttribute("capture","environment");
  if(multiple) inp.multiple = true;
  inp.id = `${qid}_${key}`;
  return inp;
}
function thumbsArea(qid, key){
  const div = document.createElement("div");
  div.className = "thumbs";
  div.id = `${qid}_${key}_thumbs`;
  return div;
}
function clearThumbs(qid, key){
  const t = document.getElementById(`${qid}_${key}_thumbs`);
  if(t) t.innerHTML="";
}

    const dataUrl = await new Promise((res, rej)=>{
      const fr = new FileReader();
      fr.onload = ()=>res(String(fr.result||""));
      fr.onerror = ()=>rej(fr.error);
      fr.readAsDataURL(f);
    });
    out.push(dataUrl);
  }
  return out;
}
function renderThumbs(qid, key, dataUrls){
  const t = document.getElementById(`${qid}_${key}_thumbs`);
  if(!t) return;
  t.innerHTML = "";
  dataUrls.forEach((url, idx)=>{
    const d = document.createElement("div");
    d.className = "thumb";
    d.style.backgroundImage = `url('${url}')`;

    const x = document.createElement("button");
    x.type = "button";
    x.className = "x";
    x.textContent = "×";
    x.onclick = ()=>{
      // remove this index
      const store = getStore();
      const list = (store?.responses?.[qid]?.[key] || []);
      list.splice(idx,1);
      setStore(store);
      renderThumbs(qid,key,list);
    };
    d.appendChild(x);
    t.appendChild(d);
  });
}

/* ---- storage for per-page answers before save ---- */
function getStore(){
  try{ return JSON.parse(localStorage.getItem("draft")||"{}"); }catch(e){ return {}; }
}
function setStore(obj){
  localStorage.setItem("draft", JSON.stringify(obj||{}));
}

        setStore(s);
        renderSingleThumb(`q42_${code}_thumbs`, "", ()=>{});
      });

      document.getElementById(`err_q42_${code}`).textContent="";
      row.classList.remove("err");
      inp.value="";
    });

    // restore selection + thumb
    const store2=getStore();
    const saved = store2?.responses?.q42?.assets?.[code] || {};
    if(saved.answer){
      const rr = document.querySelector(`input[name="q42_${code}"][value="${saved.answer}"]`);
      if(rr) rr.checked = true;
      photoWrap.style.display = (saved.answer==="Y") ? "block" : "none";
      renderSingleThumb(`q42_${code}_thumbs`, saved.photos?.[0] || "", ()=>{
        const s=getStore();
        s.responses.q42.assets[code].photos=[];
        setStore(s);
        renderSingleThumb(`q42_${code}_thumbs`, "", ()=>{});
      });
    }

    area.appendChild(row);
  });

  return box;
}

/* ================= SECTION: VALIDATION (single place) ================= */
function getRadio(qid){
  return document.querySelector(`input[name="${qid}"]:checked`)?.value || "";
}
function restoreRadio(qid){
  const store = getStore();
  const val = store?.responses?.[qid]?.answer || "";
  if(val){
    const el = document.querySelector(`input[name="${qid}"][value="${val}"]`);
    if(el) el.checked = true;
  }
}
function firstErrorScroll(el){
  if(!el) return;
  el.scrollIntoView({behavior:"smooth", block:"center"});
}

function validatePage(pageNo){
  // clear all errors in visible page area
  document.querySelectorAll(`#page${pageNo} .q`).forEach(q=>q.classList.remove("err"));
  document.querySelectorAll(`#page${pageNo} .err-msg`).forEach(e=>{ if(e.id.startsWith("err_")) e.textContent=""; });

  let firstBad = null;

  const store = getStore();
  store.responses = store.responses || {};
  setStore(store);

  // Basic details validation on page1
  if(pageNo===1){
    // required: state, branch, branchHead, officeBoy
    if(!stateEl.value){
      firstBad = firstBad || document.getElementById("state");
      stateEl.style.borderColor = "rgba(255,77,79,.75)";
    } else stateEl.style.borderColor = "var(--border)";

    if(!branchEl.value){
      firstBad = firstBad || document.getElementById("branch");
      branchEl.style.borderColor = "rgba(255,77,79,.75)";
    } else branchEl.style.borderColor = "var(--border)";

    const bh = document.getElementById("branchHead");
    const ob = document.getElementById("officeBoy");
    if(!bh.value.trim()){
      firstBad = firstBad || bh;
      bh.style.borderColor = "rgba(255,77,79,.75)";
    } else bh.style.borderColor = "var(--border)";
    if(!ob.value.trim()){
      firstBad = firstBad || ob;
      ob.style.borderColor = "rgba(255,77,79,.75)";
    } else ob.style.borderColor = "var(--border)";
  }

  // question lists per page
  const pageQ = {
    1: [...Array(18)].map((_,i)=>"q"+(i+1)),
    2: [...Array(9)].map((_,i)=>"q"+(i+19)),
    3: [...Array(10)].map((_,i)=>"q"+(i+28)),
    4: ["q38"],
    5: ["q39","q40","q41"],
    6: ["q42"]
  }[pageNo] || [];

  // validate each visible q
  for(const qid of pageQ){
    if(!shouldShowQuestion(qid)) continue;

    if(qid==="q42"){
      const br = branchEl.value || "";
      const assets = (branchAssetList?.[br] || []);
      const s = getStore();
      const aset = s?.responses?.q42?.assets || {};
      for(const assetObj of assets){
        const code = (typeof assetObj==="string") ? assetObj : (assetObj.code || assetObj.asset || assetObj.id);
        const row = document.getElementById(`q42_${code}`);
        const ans = document.querySelector(`input[name="q42_${code}"]:checked`)?.value || "";
        if(!ans){
          if(row){ row.classList.add("err"); document.getElementById(`err_q42_${code}`).textContent = L("required") || ""; }
          firstBad = firstBad || row;
          continue;
        }
        if(ans==="Y"){
          const photos = aset?.[code]?.photos || [];
          if(!photos[0]){
            if(row){ row.classList.add("err"); document.getElementById(`err_q42_${code}`).textContent = L("photoMissing") || L("photo") || ""; }
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    if(qid==="q38"){
      const photos = getStore()?.responses?.q38?.photos || [];
      if(photos.length < 5){
        setErr("q38", L("photoMissing") || L("photo") || "");
        firstBad = firstBad || document.getElementById("box_q38");
      }
      continue;
    }

    if(qid==="q25"){
      const s=getStore();
      const n = Number(s?.responses?.q25?.count || 0);
      if(!n){
        setErr("q25", L("required") || "");
        firstBad = firstBad || document.getElementById("box_q25");
      } else {
        for(let i=1;i<=n;i++){
          const it = s.responses.q25.items?.[i-1] || {};
          const row = document.getElementById(`q25_item_${i}`);
          const err = document.getElementById(`err_q25_${i}`);
          if(!it.photo || !it.expiryDate){
            if(row) row.classList.add("err");
            if(err) err.textContent = L("required") || "";
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    if(qid==="q39"){
      const s=getStore();
      const n = Number(s?.responses?.q39?.count || 0);
      if(!n){
        setErr("q39", L("required") || "");
        firstBad = firstBad || document.getElementById("box_q39");
      } else {
        for(let i=1;i<=n;i++){
          const url = s.responses.q39.photos?.[i-1] || "";
          const row = document.getElementById(`q39_item_${i}`);
          const err = document.getElementById(`err_q39_${i}`);
          if(!url){
            if(row) row.classList.add("err");
            if(err) err.textContent = L("photoMissing") || L("photo") || "";
            firstBad = firstBad || row;
          }
        }
      }
      continue;
    }

    const ans = getRadio(qid);
    if(!ans){
      setErr(qid, L("required") || "");
      firstBad = firstBad || document.getElementById("box_"+qid);
      continue;
    }

    // policy
    if(POLICY.has(qid) && ans==="Y"){
      const s=getStore();
      const r = s?.responses?.[qid] || {};
      const vOk = String(r.version||"").trim() !== "" && /^[0-9]+$/.test(String(r.version||""));
      const iOk = !!r.issueDate;
      const eOk = !!r.effectiveDate;
      const pOk = (r.photos||[])[0];
      if(!vOk || !iOk || !eOk || !pOk){
        setErr(qid, L("required") || "");
        firstBad = firstBad || document.getElementById("box_"+qid);
      }
      continue;
    }

    // yes->photo required for yn+photo & multi
    const needsPhoto =
      (YN_PHOTO.has(qid) && ans==="Y") ||
      (MULTI_1_5.has(qid) && ans==="Y");

    if(needsPhoto){
      const s=getStore();
      const photos = s?.responses?.[qid]?.photos || [];
      const min = MULTI_1_5.has(qid) ? 1 : 1;
      if(photos.length < min){
        setErr(qid, L("photoMissing") || L("photo") || "");
        firstBad = firstBad || document.getElementById("box_"+qid);
      }
    }
  }

  if(firstBad){
    // scroll
    firstErrorScroll(firstBad);
    return false;
  }
  return true;
}

/* ================= SECTION: SUBMIT & SAVE ================= */
function buildPayload(pageNumber){
  const store = getStore();
  const payload = {
    submissionId: submissionId || "",
    pageNumber,
    state: stateEl.value || "",
    branch: branchEl.value || "",
    branchHead: (document.getElementById("branchHead").value || "").trim(),
    officeBoy: (document.getElementById("officeBoy").value || "").trim(),
    responses: store.responses || {}
  };
  return payload;
}

async function onSubmitNext(){
  // validate
  if(!validatePage(currentPage)) return;

  // lock button + show pending
  const btn = document.getElementById("next"+currentPage);
  const old = btn.textContent;
  btn.disabled = true;
  btn.textContent = L("pending") || old;

  // persist basic fields to draft
  const store = getStore();
  store.basic = {
    state: stateEl.value || "",
    branch: branchEl.value || "",
    branchHead: (document.getElementById("branchHead").value || "").trim(),
    officeBoy: (document.getElementById("officeBoy").value || "").trim()
  };
  setStore(store);

  try{
    const payload = buildPayload(currentPage);
    const res = await fetch(APPS_SCRIPT_URL, {
  method: "POST",
  body: JSON.stringify(payload), // text/plain by default => no preflight
});
    const data = await res.json().catch(()=> ({}));

    if(data && data.submissionId){
      submissionId = String(data.submissionId);
      localStorage.setItem("submissionId", submissionId);
    }

    // success behavior
    if(currentPage < 6){
      showPage(currentPage + 1);
    } else {
      // final success popup + reset
      showSuccess();
      resetAll();
    }
  }catch(err){
    // if you have msgLabels error key, use it; else keep old label
    btn.textContent = L("wait") || old;
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = (currentPage===6 ? (L("submit") || L("next")) : L("next")) || old;
  }
}

function showSuccess(){
  const ov = document.getElementById("overlay");
  setText("okTitle", L("success") || "");
  setText("okSub", L("successSub") || "");
  ov.classList.add("show");
  ov.setAttribute("aria-hidden","false");
  setTimeout(()=>{ ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); }, 1600);
}

function resetAll(){
  // clear draft
  localStorage.removeItem("draft");
  // keep submissionId? no; fresh submission
  localStorage.removeItem("submissionId");
  submissionId = "";

  // reset UI
  stateEl.value = "";
  lang = "en";
  renderAll();

  document.getElementById("branchHead").value = "";
  document.getElementById("officeBoy").value = "";

  showPage(1);
}

/* ================= INIT ================= */
(function init(){
  renderStateDropdown(); // ✅ only once
  // restore basic
  const s = getStore();
  if(s?.basic){
    stateEl.value = s.basic.state || "";
    lang = (STATE_LANG?.[stateEl.value] || "en");
    renderBranchDropdown();
    branchEl.value = s.basic.branch || "";
    document.getElementById("branchHead").value = s.basic.branchHead || "";
    document.getElementById("officeBoy").value = s.basic.officeBoy || "";
  }
  renderAll();
})();
</script>
